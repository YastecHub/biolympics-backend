name: backend-ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Set up Python
        run: uv venv .venv --python 3.12
      - name: Install dependencies
        run: uv pip install --python .venv -e ".[dev]"
      - name: Ruff lint
        run: .venv/bin/ruff check .
      - name: Ruff format check
        run: .venv/bin/ruff format --check .
      - name: mypy
        run: .venv/bin/mypy app || true   # advisory until fully typed
      - name: Validate Alembic migration applies
        env:
          DATABASE_URL: sqlite+aiosqlite:///./_ci.db
          SECRET_KEY: ci-secret
        run: .venv/bin/alembic upgrade head
      - name: Pytest
        run: .venv/bin/python -m pytest -q

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t biolympics-backend:${{ github.sha }} .
      - name: Scan image (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: biolympics-backend:${{ github.sha }}
          format: table
          exit-code: "0"   # report-only; set to 1 to fail on findings
          severity: HIGH,CRITICAL
